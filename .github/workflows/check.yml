name: Check SPARQL queries
on: [pull_request, workflow_call, workflow_dispatch]

jobs:

  check:
    name: Run SPARQL checks
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-java@v5
      with:
        distribution: 'graalvm'
        java-version: '25'

    - name: Install tester
      run: wget "https://github.com/sib-swiss/sparql-examples-utils/releases/download/v2.0.23/sparql-examples-utils-2.0.23-uber.jar" -O sparql-examples-utils.jar

    - name: Run tests
      run: java -Xss8m -jar sparql-examples-utils.jar test --input-directory=examples/
